<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sourceress</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #060408;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}
canvas#dust {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}
.center {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.wordmark { display: flex; align-items: baseline; }
.letter {
  display: inline-block;
  font-size: 64px;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #f5eeee;
  opacity: 0;
  transform: translateY(30px) scale(0.85);
  will-change: opacity, transform;
}
.letter.accent { color: #E84142; }
.underline {
  width: 0;
  height: 2px;
  background: #E84142;
  margin: 12px auto 0;
  transition: width 1s cubic-bezier(0.16,1,0.3,1);
}
.subline {
  margin-top: 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0;
  transition: opacity 0.7s ease;
}
.subdot { width: 4px; height: 4px; border-radius: 50%; background: #E84142; opacity: 0.6; }
.sublabel { font-size: 12px; letter-spacing: 3px; color: #7a2020; text-transform: uppercase; }
</style>
</head>
<body>
<canvas id="dust"></canvas>
<div class="center">
  <div class="wordmark" id="wm">
    <span class="letter" id="l0">S</span>
    <span class="letter" id="l1">o</span>
    <span class="letter" id="l2">u</span>
    <span class="letter" id="l3">r</span>
    <span class="letter" id="l4">c</span>
    <span class="letter" id="l5">e</span>
    <span class="letter accent" id="l6">r</span>
    <span class="letter accent" id="l7">e</span>
    <span class="letter accent" id="l8">s</span>
    <span class="letter accent" id="l9">s</span>
  </div>
  <div class="underline" id="ul"></div>
  <div class="subline" id="sub">
    <div class="subdot"></div>
    <div class="sublabel">powered by Fubuki</div>
    <div class="subdot"></div>
  </div>
</div>
<script>
const G = id => document.getElementById(id);
const canvas = G('dust');
let ctx, particles = [], raf;

function initCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx = canvas.getContext('2d');
}

function spawnBurst(cx, cy, count, color) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 2.2;
    const life = 55 + Math.random() * 90;
    particles.push({
      x: cx + (Math.random() - 0.5) * 40,
      y: cy + (Math.random() - 0.5) * 20,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - Math.random() * 1.0,
      r: 0.6 + Math.random() * 2.2,
      life, maxLife: life, color
    });
  }
}

function tickDust() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    ctx.globalAlpha = (p.life / p.maxLife) * 0.9;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.018;
    p.vx *= 0.978;
    p.life--;
  }
  ctx.globalAlpha = 1;
  if (particles.length > 0) raf = requestAnimationFrame(tickDust);
}

function showLetter(id, delay) {
  setTimeout(() => {
    const el = G(id);
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    el.style.transition = 'opacity 0.45s ease, transform 0.45s cubic-bezier(0.16,1,0.3,1)';
    el.style.opacity = '1';
    el.style.transform = 'translateY(0) scale(1)';
    const isAccent = el.classList.contains('accent');
    spawnBurst(cx, cy, isAccent ? 22 : 14, isAccent ? '#E84142' : '#cc3333');
    spawnBurst(cx, cy, 8, '#ff9999');
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(tickDust);
  }, delay);
}

function onIntroComplete() {
  window.parent && window.parent.postMessage('introComplete', '*');
}

function run() {
  initCanvas();
  particles = [];
  cancelAnimationFrame(raf);
  for (let i = 0; i < 10; i++) {
    const el = G('l' + i);
    el.style.transition = 'none';
    el.style.opacity = '0';
    el.style.transform = 'translateY(30px) scale(0.85)';
  }
  G('ul').style.transition = 'none';
  G('ul').style.width = '0';
  G('sub').style.transition = 'none';
  G('sub').style.opacity = '0';
  for (let i = 0; i < 10; i++) {
    showLetter('l' + i, 300 + i * 100);
  }
  setTimeout(() => {
    G('ul').style.transition = 'width 1s cubic-bezier(0.16,1,0.3,1)';
    G('ul').style.width = '340px';
  }, 1500);
  setTimeout(() => {
    G('sub').style.transition = 'opacity 0.7s ease';
    G('sub').style.opacity = '1';
  }, 2100);
  setTimeout(() => { onIntroComplete(); }, 3200);
}

window.addEventListener('resize', initCanvas);
window.addEventListener('load', () => setTimeout(run, 300));
</script>
</body>
</html>
