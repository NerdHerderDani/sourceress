{% extends "base.html" %}

{% block body %}
  <div class="topbar">
    <div>
      <h1 style="margin:0" id="runTitle">Loading…</h1>
      <div id="status" class="hint">Loading…</div>
      <div id="error" class="danger" style="white-space: pre-wrap;"></div>
      <div class="hint" style="margin-top:6px;">
        Sorted by
        <select id="sort" style="width:auto;">
          <option value="score">Score</option>
          <option value="recency">Recency</option>
          <option value="followers">Followers</option>
          <option value="stars">Stars</option>
          <option value="go_share">Go share</option>
        </select>
        <span title="Scoring = Go signal (0–50) + OSS impact (0–20) + recency (0–20) + credibility (0–10) + keyword bonus (0–5). Heuristic ranking; always review profile + work.">ⓘ</span>
      </div>
    </div>
    <div>
      <a href="/">New search</a>
      &nbsp;|&nbsp;
      <a href="/runs/{{ run_id }}.csv">Export CSV</a>
    </div>
  </div>

  <div id="results"></div>

<script>
  const runId = {{ run_id }};

  function esc(s){ return (s ?? '').toString().replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

  function renderCandidate(c){
    const reasons = (c.reasons || []).map(r => `<li>${esc(r)}</li>`).join('');

    const emailLine = c.email
      ? `<div class="meta">Email (${esc(c.email_source || 'unknown')}): <code>${esc(c.email)}</code></div>`
      : `<div class="meta">Email: <span class="hint">not found</span> <button data-login="${esc(c.login)}" class="btnEmail" type="button">Find email</button></div>`;

    const detailsId = `d_${c.login}`;
    return `
      <div class="card">
        <div><img class="avatar" src="${esc(c.avatar)}"/></div>
        <div style="flex:1">
          <div style="display:flex; justify-content: space-between; gap: 12px; align-items: baseline;">
            <div>
              <a href="/candidates/${encodeURIComponent(c.login)}?back=${encodeURIComponent('/runs/' + runId)}" onclick="try{window.parent.postMessage({type:'SOURCERESS_OPEN_TAB', url:this.href}, '*');}catch(_){}; return false;">${esc(c.login)}</a>${c.name ? ` — ${esc(c.name)}` : ''}
              <span class="hint">·</span>
              <a class="extLink" data-url="${esc(c.url)}" href="/out?url=${encodeURIComponent(c.url)}">GitHub</a>
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
              <button class="btnToggle" data-target="${detailsId}" type="button" title="Why / scoring details">Why ▸</button>
              <button class="btnTrain" data-login="${esc(c.login)}" data-label="1" type="button" title="Train: good fit">👍</button>
              <button class="btnTrain" data-login="${esc(c.login)}" data-label="-1" type="button" title="Train: bad fit">👎</button>
            </div>
          </div>

          <div class="meta">${esc(c.location || '')}${c.company ? ` · ${esc(c.company)}` : ''} · ${esc(c.followers)} followers</div>
          <div class="badges">
            <span class="badge"><strong>Score</strong> ${Number(c.score).toFixed(2)}</span>
            <span class="badge"><strong>Go</strong> ${Math.round((c.go_share ?? 0)*100)}%</span>
            <span class="badge"><strong>Stars</strong> ${esc(c.stars_total ?? 0)}</span>
            <span class="badge"><strong>Recency</strong> ${c.recency_days == null ? 'n/a' : (Math.round(c.recency_days) + 'd')}</span>
          </div>

          <div class="cardActions">
            <select class="projSel" data-login="${esc(c.login)}" style="flex:1; min-width: 220px; padding:10px 12px; border-radius:10px; border:1px solid var(--border); background: var(--panel2); color: var(--text);"></select>
            <select class="statusSel" data-login="${esc(c.login)}" style="width:auto; padding:10px 12px; border-radius:10px; border:1px solid var(--border); background: var(--panel2); color: var(--text);">
              <option value="new">New</option>
              <option value="contacted">Contacted</option>
              <option value="pass">Pass</option>
            </select>
            <input class="projNote" data-login="${esc(c.login)}" placeholder="Note (saved on add)" style="flex:2; min-width: 220px;" value="" />
            <button class="btnAddProj smallBtn" data-login="${esc(c.login)}" type="button">Add</button>
            <button class="btnCopy smallBtn" data-copy="${esc(c.url)}" type="button">Copy</button>
          </div>

          <div id="${detailsId}" class="details collapsed">
            <div style="display:flex; gap:8px; flex-wrap: wrap; margin: 6px 0;">
              ${c.email ? `<button class=\"btnCopy\" data-copy=\"${esc(c.email)}\" type=\"button\">Copy email</button>` : ''}
            </div>
            ${emailLine}
            <ul>${reasons}</ul>
          </div>
        </div>
      </div>`;
  }

  function currentSort(){
    const s = document.getElementById('sort');
    return s ? s.value : 'score';
  }

  async function poll(){
    const sort = currentSort();
    const res = await fetch(`/runs/${runId}.json?sort=${encodeURIComponent(sort)}`, {cache:'no-store'});
    const data = await res.json();

    const st = data.status || {};
    const processed = st.processed ?? 0;
    const total = st.total ?? 0;
    // Title: show query / repo seeds instead of "Run #"
    const q = (st.raw_query || '').trim();
    const seeds = (st.repo_seeds || '').trim();
    const title = q ? q : `Run ${runId}`;
    document.getElementById('runTitle').textContent = seeds ? `${title}  [${seeds}]` : title;

    document.getElementById('status').textContent = `${st.status || 'unknown'} — ${processed}/${total}`;

    const errEl = document.getElementById('error');
    errEl.textContent = st.status === 'error' ? (st.error || 'error') : '';

    const list = data.candidates || [];
    document.getElementById('results').innerHTML = list.map(renderCandidate).join('');

    // wire email buttons
    document.querySelectorAll('.btnEmail').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const login = e.currentTarget.getAttribute('data-login');
        e.currentTarget.disabled = true;
        e.currentTarget.textContent = 'Searching…';
        try {
          await fetch(`/candidates/${encodeURIComponent(login)}/email`, {method:'POST'});
        } finally {
          // refresh list after fetch
          poll();
        }
      }, {once:true});
    });

    // collapse/expand
    document.querySelectorAll('.btnToggle').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const targetId = e.currentTarget.getAttribute('data-target');
        const el = document.getElementById(targetId);
        if (!el) return;
        el.classList.toggle('collapsed');
        e.currentTarget.textContent = el.classList.contains('collapsed') ? 'Why ▸' : 'Why ▾';
      });
    });

    // copy buttons
    document.querySelectorAll('.btnCopy').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const text = e.currentTarget.getAttribute('data-copy') || '';
        if (!text) return;
        try {
          const old = e.currentTarget.textContent;
          await navigator.clipboard.writeText(text);
          e.currentTarget.textContent = 'Copied';
          setTimeout(() => (e.currentTarget.textContent = old), 800);
        } catch (_) {
          // ignore
        }
      });
    });

    // projects dropdown + remember last selected
    let projects = [];
    try {
      const resP = await fetch('/projects', {cache:'no-store'});
      const dataP = await resP.json();
      projects = (dataP.items || []).map(p => ({ id: String(p.id), name: p.name }));
    } catch (_) {}

    const lastPid = localStorage.getItem('last_project_id') || '';

    document.querySelectorAll('select.projSel').forEach(sel => {
      if (sel.__filled) return;
      sel.__filled = true;
      sel.innerHTML = '';
      const opt0 = document.createElement('option');
      opt0.value = '';
      opt0.textContent = projects.length ? 'Choose project…' : 'No projects yet';
      sel.appendChild(opt0);
      projects.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        sel.appendChild(opt);
      });
      if (lastPid) sel.value = lastPid;
      sel.addEventListener('change', () => {
        if (sel.value) localStorage.setItem('last_project_id', sel.value);
      });
    });

    const lastStatus = localStorage.getItem('last_project_status') || 'new';
    document.querySelectorAll('select.statusSel').forEach(sel => {
      if (sel.__filled) return;
      sel.__filled = true;
      if (lastStatus) sel.value = lastStatus;
      sel.addEventListener('change', () => {
        localStorage.setItem('last_project_status', sel.value);
      });
    });

    function openProject(pid){
      if (!pid) return;
      window.location.href = `/projects-ui#${encodeURIComponent(String(pid))}`;
    }

    document.querySelectorAll('.btnAddProj').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        if (e.currentTarget.classList.contains('btnOpenProject')) {
          const pid = e.currentTarget.getAttribute('data-project-id');
          openProject(pid);
          return;
        }
        const login = e.currentTarget.getAttribute('data-login');
        const sel = document.querySelector(`select.projSel[data-login="${login}"]`);
        const statusEl = document.querySelector(`select.statusSel[data-login="${login}"]`);
        const noteEl = document.querySelector(`input.projNote[data-login="${login}"]`);
        const pid = sel?.value;
        if (!pid) return;
        const note = (noteEl?.value || '').trim();
        const status = (statusEl?.value || 'new');

        e.currentTarget.disabled = true;
        try {
          const fd = new FormData();
          fd.append('login', login);
          fd.append('note', note);
          fd.append('status', status);
          await fetch(`/projects/${pid}/add`, { method: 'POST', body: fd });
          localStorage.setItem('last_project_id', pid);
          localStorage.setItem('last_project_status', status);

          const old = e.currentTarget.textContent;
          e.currentTarget.textContent = 'Added';
          setTimeout(() => {
            e.currentTarget.textContent = 'Open project';
            e.currentTarget.disabled = false;
            e.currentTarget.classList.add('btnOpenProject');
            e.currentTarget.setAttribute('data-project-id', String(pid));
            // dopamine mode: auto-open unless Shift is held (bulk add)
            if (!e.shiftKey) {
              setTimeout(() => openProject(pid), 150);
            }
          }, 650);
        } finally {
          // Keep disabled until we flip to Open project; if request fails, re-enable.
          if (!e.currentTarget.classList.contains('btnOpenProject')) {
            e.currentTarget.disabled = false;
          }
        }
      });
    });

    // wire training buttons
    document.querySelectorAll('.btnTrain').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const login = e.currentTarget.getAttribute('data-login');
        const label = e.currentTarget.getAttribute('data-label');
        e.currentTarget.disabled = true;
        try {
          const form = new FormData();
          form.append('login', login);
          form.append('label', label);
          await fetch(`/runs/${runId}/feedback`, {method:'POST', body: form});
        } finally {
          // no-op; we just store feedback
        }
      }, {once:true});
    });

    if (st.status !== 'done' && st.status !== 'error') {
      setTimeout(poll, 2000);
    }
  }

  // sort change re-renders (no need to wait)
  document.getElementById('sort')?.addEventListener('change', () => poll());

  // If running inside Tauri, open external links via native opener.
  document.addEventListener('click', async (e) => {
    const a = e.target?.closest?.('a.extLink');
    if (!a) return;
    const url = a.getAttribute('data-url');
    if (!url) return;
    const tauriInvoke = window.__TAURI__?.core?.invoke;
    if (typeof tauriInvoke === 'function') {
      e.preventDefault();
      try {
        await tauriInvoke('open_url', { url });
      } catch (_) {
        // fallback: normal navigation
        window.location.href = a.href;
      }
    }
  }, true);

  // (project actions are now inline on each card)

  poll();
</script>
{% endblock %}
