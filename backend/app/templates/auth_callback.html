{% extends "base.html" %}
{% block body %}
  <div class="panel">
    <h2 style="margin-top:0">Finishing login…</h2>
    <p class="hint">If this page doesn’t redirect in a moment, go back to <a href="/">home</a>.</p>
    <div id="msg" class="info" style="margin-top: 14px;">Working…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = {{ supabase_url|tojson }};
    const SUPABASE_ANON_KEY = {{ supabase_anon_key|tojson }};

    async function main() {
      const msg = document.getElementById('msg');
      try {
        if (!SUPABASE_URL || !SUPABASE_ANON_KEY) throw new Error('Supabase not configured.');
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Supabase puts tokens in the URL hash for magic-link flows.
        const { data, error } = await sb.auth.getSession();
        if (error) throw error;

        const accessToken = data?.session?.access_token;
        if (!accessToken) throw new Error('No session found in callback URL.');

        const r = await fetch('/auth/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ access_token: accessToken })
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j?.error || 'Failed to set session cookie');

        msg.textContent = 'Logged in. Redirecting…';
        window.location.replace('/');
      } catch (e) {
        msg.textContent = 'Login failed: ' + (e?.message || String(e));
      }
    }
    main();
  </script>
{% endblock %}
