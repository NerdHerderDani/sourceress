<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title or "Sourceress" }}</title>
  <link rel="icon" href="/static/logo.png" />
  <style>
    @font-face {
      font-family: 'Flynn';
      src: url('/static/fonts/Flynn.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Flynn';
      src: url('/static/fonts/Flynn Italic.otf') format('opentype');
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }
    @font-face {
      font-family: 'Flynn';
      src: url('/static/fonts/Flynn Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Flynn';
      src: url('/static/fonts/Flynn Bold Italic.otf') format('opentype');
      font-weight: 700;
      font-style: italic;
      font-display: swap;
    }
    :root {
      color-scheme: light dark;
      /* cyber black-ops */
      --bg: #070809;
      --panel: #0c0e10;
      --panel2: #090b0d;
      --border: #1f2328;
      --text: #e8edf2;
      --muted: #8b949e;
      --link: #ff6b6b;
      --accent: #ff3b3b;
      --accent2: #ff9a3b;
      --danger: #ff4d6d;
    }

    @media (prefers-color-scheme: light) {
      :root {
        /* keep a light fallback but still on-brand */
        --bg: #ffffff;
        --panel: #f6f7f9;
        --panel2: #ffffff;
        --border: #d0d7de;
        --text: #111418;
        --muted: #57606a;
        --link: #b00020;
        --accent: #b00020;
        --accent2: #ff9a3b;
        --danger: #b00020;
      }
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 700px at 20% -10%, rgba(255,59,59,0.10), transparent 55%),
        radial-gradient(900px 600px at 110% 20%, rgba(255,154,59,0.08), transparent 50%),
        var(--bg);
      color: var(--text);
    }

    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

    h1,h2,h3 { margin: 0; font-family: Flynn, system-ui, sans-serif; letter-spacing: 0.2px; }
    h1 { font-size: 28px; font-weight: 800; }
    h2 { font-size: 18px; font-weight: 800; }

    .subtle { color: var(--muted); font-size: 13px; }

    .topbar {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: color-mix(in srgb, var(--panel) 70%, transparent);
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }
    .pill:hover { transform: translateY(-1px); text-decoration:none; background: color-mix(in srgb, var(--panel) 85%, transparent); border-color: color-mix(in srgb, var(--link) 18%, var(--border)); }

    .panel {
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--panel) 92%, transparent),
        color-mix(in srgb, var(--panel2) 92%, transparent)
      );
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.38);
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel2);
      color: var(--text);
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: color-mix(in srgb, var(--link) 55%, var(--border));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--link) 22%, transparent);
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border));
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--accent) 18%, var(--panel)),
        color-mix(in srgb, var(--accent) 10%, var(--panel2))
      );
      color: var(--text);
      cursor: pointer;
      box-shadow: 0 0 0 0 rgba(255,59,59,0.0);
      transition: transform 120ms ease, box-shadow 160ms ease, border-color 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 55%, var(--border));
      box-shadow: 0 0 0 3px rgba(255,59,59,0.10);
    }

    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    .hint { color: var(--muted); font-size: 13px; }
    .danger { color: var(--danger); }

    .info {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: color-mix(in srgb, var(--panel2) 75%, transparent);
      color: var(--muted);
      font-size: 13px;
    }

    .tipsToggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
    }

    .tipsToggle:hover {
      background: color-mix(in srgb, var(--panel) 70%, transparent);
    }

    .tipsBox { margin-top: 10px; }
    .tipsBox.hidden { display: none; }

    .card {
      display: flex;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      margin: 12px 0;
      background: color-mix(in srgb, var(--panel2) 90%, transparent);
    }

    .tile {
      display:block;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.01)
      );
      box-shadow: 0 10px 24px rgba(0,0,0,0.32);
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }
    .tile:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
      box-shadow: 0 18px 34px rgba(0,0,0,0.42);
      text-decoration:none;
    }

    .kpi {
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap: 10px;
      margin-top: 10px;
    }
    .kpi .value { font-weight: 900; font-size: 18px; }

    .details {
      margin-top: 8px;
    }

    .details.collapsed {
      display: none;
    }

    .btnToggle {
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
    }

    .badges { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
    .badge {
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 75%, transparent);
      font-size: 12px;
      color: var(--muted);
    }

    .cardActions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:10px; }
    .smallBtn {
      padding: 6px 10px;
      border-radius: 10px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel2);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 70%, transparent);
      font-size: 13px;
    }

    .chip button {
      padding: 0 6px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
    }

    .chipInput {
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      min-width: 160px;
      padding: 6px 2px;
    }

    img.avatar { width: 56px; height: 56px; border-radius: 50%; border: 1px solid var(--border); }
    .meta { color: var(--muted); font-size: 13px; }
    .score { font-weight: 700; }
    ul { margin: 6px 0 0 18px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <div style="font-family: Flynn, system-ui; font-size: 28px; font-weight: 700; letter-spacing: 0.2px;">
          <a href="/" style="color: inherit; text-decoration: none;">Sourceress</a>
        </div>
        <div class="meta" style="margin-top: 4px;">
          {% if request and request.state and request.state.user_email %}
            Signed in as <span class="pill">{{ request.state.user_email }}</span>
          {% else %}
            <span class="pill">Not signed in</span>
          {% endif %}
        </div>
      </div>
      <div style="display:flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: flex-end;">
        <a class="pill" href="/command">Command</a>
        <a class="pill" href="/">Search</a>
        <a class="pill" href="/stack">Stack</a>
        <a class="pill" href="/projects-ui">Projects</a>
        <a class="pill" href="/companies">Talent Mapping</a>
        <a class="pill" href="/linkedin">LinkedIn</a>
        <a class="pill" href="/settings">Settings</a>
        <a class="pill" href="/auth/logout">Logout</a>
      </div>
    </div>

    {% block body %}{% endblock %}
  </div>
  <script>
    // Allow the desktop wrapper (cross-origin) to ask pages for their current URL.
    window.addEventListener('message', (e) => {
      try {
        if (e?.data?.type === 'SOURCERESS_GET_LOCATION') {
          e.source?.postMessage({ type: 'SOURCERESS_LOCATION', href: window.location.href }, '*');
        }
      } catch (_) {}
    });
  </script>
</body>
</html>
